<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Kids Routine — familia inclusiva">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="60%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="100" height="100" rx="22" fill="url(#g)"/>

  <!-- ─── Adulto izquierdo ─── -->
  <!-- Cabeza: círculo neutro, sin rasgos de género -->
  <circle cx="22" cy="32" r="11" fill="white" fill-opacity="0.93"/>
  <!-- Cuerpo: elipse simétrica, sin distinción de género -->
  <ellipse cx="22" cy="57" rx="12" ry="14" fill="white" fill-opacity="0.93"/>

  <!-- ─── Adulto derecho (idéntico al izquierdo, espejado) ─── -->
  <circle cx="78" cy="32" r="11" fill="white" fill-opacity="0.93"/>
  <ellipse cx="78" cy="57" rx="12" ry="14" fill="white" fill-opacity="0.93"/>

  <!-- ─── Brazos de abrazo (dibujados antes del pequeño → quedan detrás) ─── -->
  <!-- Brazo del adulto izquierdo hacia el pequeño -->
  <path d="M34,56 Q43,54 44,65"
        fill="none" stroke="white" stroke-opacity="0.93"
        stroke-width="7" stroke-linecap="round"/>
  <!-- Brazo del adulto derecho hacia el pequeño -->
  <path d="M66,56 Q57,54 56,65"
        fill="none" stroke="white" stroke-opacity="0.93"
        stroke-width="7" stroke-linecap="round"/>

  <!-- ─── Pequeño (centro, más bajo y más pequeño) ─── -->
  <!-- Cuerpo primero → tapa los extremos de los brazos (efecto de abrazo) -->
  <ellipse cx="50" cy="65" rx="9" ry="11" fill="white"/>
  <!-- Cabeza encima -->
  <circle cx="50" cy="41" r="10" fill="white"/>

  <!-- ─── Corazón pequeño entre las tres figuras ─── -->
  <path d="M50,21 C50,21 48.5,18 46,18 C43.3,18 41.5,20.2 41.5,22.5
           C41.5,26.5 50,31 50,31
           C50,31 58.5,26.5 58.5,22.5
           C58.5,20.2 56.7,18 54,18
           C51.5,18 50,21 50,21Z"
        fill="white" fill-opacity="0.82"/>
</svg>
